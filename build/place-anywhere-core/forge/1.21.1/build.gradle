buildscript {
    repositories {
        maven { url = 'https://maven.neoforged.net/releases' }
        maven { url = 'https://maven.aliyun.com/repository/public' }
        maven { url = 'https://plugins.gradle.org/m2/' }
        mavenCentral()
    }
    dependencies {
        classpath 'net.neoforged.gradle:userdev:7.0.192'
    }
}

apply plugin: 'net.neoforged.gradle.userdev'

version = '0.1.0'
group = 'com.placeanywhere'
base { archivesName = 'placeanywhere' }

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

sourceSets {
    main {
        java { srcDir '../../../../src/place-anywhere-core/forge/1.21.1/java' }
        resources { srcDir '../../../../src/place-anywhere-core/forge/1.21.1/resources' }
    }
}

repositories {
    maven { url = 'https://maven.aliyun.com/repository/public' }
    maven { url = 'https://maven.neoforged.net/releases' }
}

dependencies {
    implementation 'net.neoforged:neoforge:21.1.77'
}
